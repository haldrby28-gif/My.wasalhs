name: Build Waselha Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - customer_app
          - driver_app
          - partner_app
          - admin_app

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug
          path: |
            ${{ matrix.app }}/app/build/outputs/apk/debug/*.apk
