name: Build All Delivery APKs

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build All Apps Debug APKs
      run: |
        gradle :admin_app:assembleDebug
        gradle :customer_app:assembleDebug
        gradle :driver_app:assembleDebug
        gradle :partner_app:assembleDebug

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: all-apps-apks
        path: '**/build/outputs/apk/debug/*.apk'
